# This workflow is triggered by a new release in Jarl.
# It does two things:
# 1. update the `VERSION` in `setup.py`. This corresponds to the version
#    of Jarl to download during hook installation.
# 2. make a new tag corresponding to `VERSION`.
#
# Example:
#   - Jarl has releases 0.4.0, 0.5.0, 0.6.0
#   - jarl-pre-commit has the same releases
#   - the user passes "rev: 0.5.0"
#
# In this case, pre-commit clones the tag 0.5.0 and runs `pip install .`.
# The custom build step in setup.py fetches Jarl 0.5.0 and bundles it into
# the hook's Python environment, which pre-commit then caches.

name: Update jarl version

on:
  repository_dispatch:
    types: [jarl-release]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update version in setup.py
        env:
          NEW_VERSION: ${{ github.event.client_payload.version }}
        run: |
          sed -i "s/^VERSION = \".*\"/VERSION = \"${NEW_VERSION}\"/" setup.py
          echo "Updated to jarl ${NEW_VERSION}"
          grep '^VERSION' setup.py

      - name: Commit, tag, and push
        env:
          NEW_VERSION: ${{ github.event.client_payload.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add setup.py
          git commit -m "Update jarl to ${NEW_VERSION}"
          git tag "${NEW_VERSION}"
          git push origin main --tags

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ github.event.client_payload.version }}
        run: |
          gh release create "${NEW_VERSION}" \
            --title "jarl ${NEW_VERSION}" \
            --notes "Update jarl to [${NEW_VERSION}](https://github.com/etiennebacher/jarl/releases/tag/${NEW_VERSION})"
